<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - myInvesting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-container { max-width: 400px; margin: 4rem auto; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; }
        .flash-messages { color: var(--danger); text-align: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container auth-container">
        <h1>회원가입</h1>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-messages">
                {% for message in messages %}
                  <p>{{ message }}</p>
                {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/register" method="post" class="card">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" style="width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 0.5rem; font-size: 1rem;" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">회원가입</button>
            <div style="text-align: center; margin-top: 1rem;">
                <a href="/login" style="color: var(--primary); text-decoration: none;">이미 계정이 있으신가요? 로그인</a>
            </div>
        </form>
    </div>
</body>
</html>
